<body class="min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ─────────────────────────────── IndexedDB helpers ─── */
    const DB_NAME = 'VerifEmplacements';
    const DB_VERSION = 1;
    const STORE = 'products';

    function openDB() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = e => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE)) {
            db.createObjectStore(STORE, { keyPath: 'id' });
          }
        };
        req.onsuccess = e => res(e.target.result);
        req.onerror = e => rej(e.target.error);
      });
    }

    async function dbReset() {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).clear();
      return new Promise((res, rej) => {
        tx.oncomplete = res;
        tx.onerror = e => rej(e.target.error);
      });
    }

    async function dbSave(products) {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readwrite');
      const store = tx.objectStore(STORE);
      store.clear();
      for (const p of products) store.put(p);
      return new Promise(res => { tx.oncomplete = res; });
    }

    async function dbLoad() {
      const db = await openDB();
      const tx = db.transaction(STORE, 'readonly');
      const store = tx.objectStore(STORE);
      return new Promise((res, rej) => {
        const req = store.getAll();
        req.onsuccess = () => res(req.result || []);
        req.onerror = () => rej(req.error);
      });
    }

    /* ─────────────────────────────── Excel import ─── */
    function parseExcel(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array', cellText: false, cellDates: true });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

            // Detect header row
            let startRow = 0;
            if (rows.length > 0) {
              const first = String(rows[0][0] || '').toLowerCase();
              if (first.includes('ref') || first.includes('réf') || first.includes('produit') || first.includes('article')) {
                startRow = 1;
              }
            }

            const products = [];
            for (let i = startRow; i < rows.length; i++) {
              const row = rows[i];
              if (!row[0] && !row[1]) continue; // skip empty rows
              const ref = String(row[0] || '').trim();
              const designation = String(row[1] || '').trim();
              const stock = String(row[2] || '').trim();
              const emplacementFormate = String(row[3] || '').trim();
              const emplacement = String(row[4] || '').trim();
              const ean = String(row[5] || '').trim();
              const fournisseur = String(row[6] || '').trim();
              const uniteVente = String(row[7] || '').trim();
              const refFournisseur = String(row[8] || '').trim();
              const cdeFournisseur = String(row[9] || '').trim();

              products.push({
                id: i,
                ref,
                designation,
                stock,
                emplacement,
                emplacementFormate,
                ean,
                fournisseur,
                uniteVente,
                refFournisseur,
                cdeFournisseur,
                originalEmplacement: emplacement,
                originalEmplacementFormate: emplacementFormate,
                originalEan: ean,
                modified: false,
                modifiedFields: { emplacement: false, emplacementFormate: false, ean: false }
              });
            }
            res(products);
          } catch (err) {
            rej(err);
          }
        };
        reader.onerror = rej;
        reader.readAsArrayBuffer(file);
      });
    }

    /* ─────────────────────────────── Excel export ─── */
    async function exportModified(products) {
      const modified = products.filter(p => p.modified);
      if (modified.length === 0) return false;

      const wb = new ExcelJS.Workbook();
      wb.creator = 'Vérif Emplacements';
      wb.created = new Date();
      const ws = wb.addWorksheet('Modifications');

      // Header style
      const headerFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF3D8F7A' } };
      const headerFont = { bold: true, color: { argb: 'FFFFFFFF' }, size: 11 };
      const yellowFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF3B0' } };
      const border = {
        top: { style: 'thin', color: { argb: 'FFD0E8DB' } },
        left: { style: 'thin', color: { argb: 'FFD0E8DB' } },
        bottom: { style: 'thin', color: { argb: 'FFD0E8DB' } },
        right: { style: 'thin', color: { argb: 'FFD0E8DB' } }
      };

      // Columns
      ws.columns = [
        { header: 'Réf produit', key: 'ref', width: 16 },
        { header: 'Désignation', key: 'designation', width: 32 },
        { header: 'Stock', key: 'stock', width: 10 },
        { header: 'Emplacement formaté', key: 'emplacementFormate', width: 22 },
        { header: 'Emplacement', key: 'emplacement', width: 18 },
        { header: 'Code EAN', key: 'ean', width: 18 },
        { header: 'Fournisseur', key: 'fournisseur', width: 20 },
        { header: 'Unité de vente', key: 'uniteVente', width: 15 },
        { header: 'Réf fournisseur', key: 'refFournisseur', width: 18 },
        { header: 'Code-barres', key: 'eanBarcode', width: 36 },
      ];

      // Style header row
      const headerRow = ws.getRow(1);
      headerRow.eachCell(cell => {
        cell.fill = headerFill;
        cell.font = headerFont;
        cell.alignment = { vertical: 'middle', horizontal: 'center' };
        cell.border = border;
      });
      headerRow.height = 24;

      // Add data rows
      modified.forEach(p => {
        const row = ws.addRow({
          ref: p.ref,
          designation: p.designation,
          stock: p.stock,
          emplacementFormate: p.emplacementFormate,
          emplacement: p.emplacement,
          ean: p.ean,
          fournisseur: p.fournisseur,
          uniteVente: p.uniteVente,
          refFournisseur: p.refFournisseur,
          eanBarcode: p.ean || '',
        });
        row.height = 48;

        // Apply EAN13 barcode font on column J (index 10)
        const barcodeCell = row.getCell(10);
        barcodeCell.font = { name: 'EAN-13', size: 36 };
        barcodeCell.alignment = { vertical: 'middle', horizontal: 'left' };

        const colMap = {
          emplacementFormate: 4,
          emplacement: 5,
          ean: 6,
        };

        row.eachCell((cell, colNumber) => {
          cell.border = border;
          cell.alignment = { vertical: 'middle' };
        });

        for (const [field, colIdx] of Object.entries(colMap)) {
          if (p.modifiedFields[field]) {
            const cell = row.getCell(colIdx);
            cell.fill = yellowFill;
            cell.font = { bold: true };
          }
        }
      });

      // Auto-filter
      ws.autoFilter = { from: 'A1', to: 'J1' };

      // Download
      const buffer = await wb.xlsx.writeBuffer();
      const blob = new Blob([buffer], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `modifications_emplacements_${new Date().toISOString().slice(0,10)}.xlsx`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      return true;
    }

    /* ─────────────────────────────── Format helpers ─── */
    function formatEmplacement(rawCode) {
      // Converts 301021120000 to Z30-A1-C021-N1-E20000
      const cleaned = String(rawCode || '').replace(/\D/g, '').padStart(12, '0');
      if (cleaned.length < 12) return rawCode; // Accept partial edits

      const zone = cleaned.substring(0, 2);    // 30
      const aisle = cleaned.substring(2, 3);   // 1
      const column = cleaned.substring(3, 6);  // 021
      const level = cleaned.substring(6, 7);   // 1
      const position = cleaned.substring(7, 12); // 20000

      return `Z${zone}-A${aisle}-C${column}-N${level}-E${position}`;
    }

    function parseFormattedEmplacement(formatted) {
      // Converts Z30-A1-C021-N1-E2 back to raw digits (for comparison)
      const match = (formatted || '').match(/Z(\d+)-A(\d+)-C(\d+)-N(\d+)-E(\d+)/);
      if (!match) return formatted;
      return match[1] + match[2] + match[3] + match[4] + match[5].padEnd(5, '0');
    }

    /* ─────────────────────────────── Icons (SVG inline) ─── */

        search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
        list: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
        export: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
        camera: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>,
        keyboard: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>,
        edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
        check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
        x: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        back: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
        barcode: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 5v14"/><path d="M8 5v14"/><path d="M12 5v14"/><path d="M17 5v14"/><path d="M21 5v14"/></svg>,
        sun: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
        moon: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
        warehouse: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
        info: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
        trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
        file: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
      };
      return icons[name] || null;
    };

    /* ─────────────────────────────── Toast ─── */
    function Toast({ toast }) {
      if (!toast) return null;
      const colors = {
        success: 'bg-pg-dark text-white',
        error: 'bg-red-500 text-white',
        info: 'bg-blue-500 text-white',
        warning: 'bg-amber-500 text-white',
      };
      return (
        <div className={`fixed top-4 left-1/2 z-50 toast-enter px-5 py-3 rounded-xl2 shadow-float text-sm font-medium flex items-center gap-2 max-w-xs ${colors[toast.type] || colors.info}`}
          style={{ transform: 'translateX(-50%)' }}>
          {toast.type === 'success' && <Icon name="check" size={16} />}
          {toast.type === 'error' && <Icon name="x" size={16} />}
          {toast.type === 'info' && <Icon name="info" size={16} />}
          <span>{toast.message}</span>
        </div>
      );
    }

    /* ─────────────────────────────── Scanner Component ─── */
    function Scanner({ onScan, onClose }) {
      const videoRef = useRef(null);
      const streamRef = useRef(null);
      const rafRef = useRef(null);
      const canvasRef = useRef(null);
      const [error, setError] = useState(null);
      const [ready, setReady] = useState(false);

      const stopAll = () => {
        cancelAnimationFrame(rafRef.current);
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(t => t.stop());
          streamRef.current = null;
        }
      };

      useEffect(() => {
        let active = true;

        const startCamera = async () => {
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
            });
            if (!active) { stream.getTracks().forEach(t => t.stop()); return; }
            streamRef.current = stream;
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.play().then(() => { if (active) setReady(true); }).catch(() => {});
            }
          } catch (e) {
            if (active) setError('Impossible d\'accéder à la caméra. Vérifiez les autorisations.');
          }
        };

        startCamera();
        return () => { active = false; stopAll(); };
      }, []);

      // Scan loop using BarcodeDetector if available, else canvas+manual decode
      useEffect(() => {
        if (!ready) return;
        const video = videoRef.current;
        const canvas = canvasRef.current;
        if (!video || !canvas) return;

        const hasBD = 'BarcodeDetector' in window;
        let detector = null;
        if (hasBD) {
          try {
            detector = new window.BarcodeDetector({ formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'upc_a', 'upc_e', 'itf', 'qr_code', 'data_matrix'] });
          } catch {
            detector = new window.BarcodeDetector();
          }
        }

        const ctx = canvas.getContext('2d');
        let lastScan = 0;

        const tick = async () => {
          if (video.readyState < 2) { rafRef.current = requestAnimationFrame(tick); return; }

          const now = Date.now();
          if (now - lastScan < 300) { rafRef.current = requestAnimationFrame(tick); return; }
          lastScan = now;

          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);

          try {
            if (detector) {
              const results = await detector.detect(canvas);
              if (results && results.length > 0) {
                const val = results[0].rawValue;
                stopAll();
                onScan(val);
                return;
              }
            }
          } catch {}

          rafRef.current = requestAnimationFrame(tick);
        };

        rafRef.current = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(rafRef.current);
      }, [ready]);

      const handleClose = () => { stopAll(); onClose(); };

      return (
        <div className="fade-in">
          {error ? (
            <div className="rounded-xl2 bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800 p-4 text-center">
              <p className="text-sm text-red-600 dark:text-red-400 mb-3">{error}</p>
              <button onClick={handleClose} className="text-sm font-medium text-gray-600 dark:text-gray-300 underline">Fermer</button>
            </div>
          ) : (
            <>
              <div className="relative w-full rounded-xl2 overflow-hidden bg-black" style={{ minHeight: 220 }}>
                <video
                  ref={videoRef}
                  muted
                  playsInline
                  autoPlay
                  className="w-full h-full object-cover"
                  style={{ display: 'block', minHeight: 220 }}
                />
                <canvas ref={canvasRef} className="hidden" />
                {/* Viewfinder overlay */}
                <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                  <div className="w-64 h-24 border-2 border-white/80 rounded-lg relative">
                    <div className="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-pg-dark rounded-tl-sm" />
                    <div className="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-pg-dark rounded-tr-sm" />
                    <div className="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-pg-dark rounded-bl-sm" />
                    <div className="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-pg-dark rounded-br-sm" />
                    <div className="absolute top-1/2 left-0 right-0 h-px bg-red-400/70" style={{ animation: 'pulse 1.5s ease-in-out infinite' }} />
                  </div>
                </div>
                {!ready && (
                  <div className="absolute inset-0 flex items-center justify-center bg-black/60">
                    <div className="w-8 h-8 border-2 border-pg-mid border-t-pg-dark rounded-full animate-spin" />
                  </div>
                )}
              </div>
              <p className="text-xs text-center text-gray-400 dark:text-gray-500 mt-2 mb-2">Centrez le code-barres dans le cadre</p>
            </>
          )}
          <button
            onClick={handleClose}
            className="mt-1 w-full py-2.5 rounded-xl2 bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-medium text-sm"
          >
            Annuler le scan
          </button>
        </div>
      );
    }

    /* ─────────────────────────────── ProductCard ─── */
    function ProductCard({ product, onUpdate, onClose, showToast, darkMode }) {
      const [local, setLocal] = useState({ ...product });
      const [scanningEan, setScanningEan] = useState(false);
      const [saved, setSaved] = useState(false);

      const handleChange = (field, value) => {
        const updated = { ...local, [field]: value };

        // Auto-format: if emplacement (raw) changes, auto-generate emplacementFormate
        if (field === 'emplacement') {
          updated.emplacementFormate = formatEmplacement(value);
        }

        const modifiedFields = {
          emplacement: updated.emplacement !== updated.originalEmplacement,
          emplacementFormate: updated.emplacementFormate !== updated.originalEmplacementFormate,
          ean: updated.ean !== updated.originalEan,
        };
        updated.modifiedFields = modifiedFields;
        updated.modified = Object.values(modifiedFields).some(Boolean);
        setLocal(updated);
        setSaved(false);
      };

      const handleSave = () => {
        onUpdate(local);
        setSaved(true);
        showToast('Modifications enregistrées', 'success');
      };

      const handleReset = (field) => {
        const origMap = {
          emplacement: 'originalEmplacement',
          emplacementFormate: 'originalEmplacementFormate',
          ean: 'originalEan',
        };
        handleChange(field, local[origMap[field]]);
      };

      const isModified = (field) => local.modifiedFields?.[field] || false;

      const fieldClass = (field) =>
        `w-full px-3 py-2.5 rounded-xl2 border text-sm outline-none transition-all ` +
        (isModified(field)
          ? 'bg-yellow-50 border-yellow-400 dark:bg-yellow-900/30 dark:border-yellow-600 font-medium'
          : 'bg-white dark:bg-gray-800 border-pg-mid dark:border-gray-700 focus:border-pg-dark');

      return (
        <div className="slide-up">
          {/* Header */}
          <div className="flex items-center gap-3 mb-4">
            <button onClick={onClose} className="p-2 rounded-xl2 bg-pg-soft dark:bg-gray-800 text-pg-dark">
              <Icon name="back" size={18} />
            </button>
            <div className="flex-1 min-w-0">
              <p className="font-bold text-gray-800 dark:text-white text-sm truncate">{local.ref}</p>
              <p className="text-xs text-gray-500 dark:text-gray-400 truncate">{local.designation}</p>
            </div>
            {local.modified && (
              <span className="px-2 py-1 bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400 text-xs rounded-lg font-semibold">
                Modifié
              </span>
            )}
          </div>

          {/* Read-only info */}
          <div className="grid grid-cols-2 gap-2 mb-4">
            {[
              ['Référence', local.ref],
              ['Stock', local.stock],
              ['Fournisseur', local.fournisseur],
              ['Unité de vente', local.uniteVente],
              ['Réf fournisseur', local.refFournisseur],
            ].map(([label, val]) => (
              <div key={label} className="bg-pg-light dark:bg-gray-800 rounded-xl2 px-3 py-2 border border-pg-soft dark:border-gray-700">
                <p className="text-xs text-gray-400 dark:text-gray-500 mb-0.5">{label}</p>
                <p className="text-sm font-medium text-gray-700 dark:text-gray-200 truncate">{val || '—'}</p>
              </div>
            ))}
            <div className="col-span-2 bg-pg-light dark:bg-gray-800 rounded-xl2 px-3 py-2 border border-pg-soft dark:border-gray-700">
              <p className="text-xs text-gray-400 dark:text-gray-500 mb-0.5">Désignation</p>
              <p className="text-sm font-medium text-gray-700 dark:text-gray-200">{local.designation || '—'}</p>
            </div>
          </div>

          {/* Editable fields */}
          <div className="space-y-3 mb-4">
            <p className="text-xs font-semibold text-pg-dark uppercase tracking-wide">Champs modifiables</p>

            {/* Emplacement */}
            <div>
              <div className="flex items-center justify-between mb-1">
                <label className="text-xs font-medium text-gray-600 dark:text-gray-400">
                  Emplacement brut (ex: 301021120000)
                  {isModified('emplacement') && <span className="ml-2 text-yellow-600 dark:text-yellow-400">●</span>}
                </label>
                {isModified('emplacement') && (
                  <button onClick={() => handleReset('emplacement')} className="text-xs text-pg-dark underline">
                    Réinitialiser
                  </button>
                )}
              </div>
              <input
                type="text"
                value={local.emplacement}
                onChange={e => handleChange('emplacement', e.target.value)}
                className={fieldClass('emplacement')}
                placeholder="301021120000"
              />
              <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">Le format sera auto-généré</p>
            </div>

            {/* Emplacement formaté */}
            <div>
              <div className="flex items-center justify-between mb-1">
                <label className="text-xs font-medium text-gray-600 dark:text-gray-400">
                  Emplacement formaté (auto-généré)
                  {isModified('emplacementFormate') && <span className="ml-2 text-yellow-600 dark:text-yellow-400">●</span>}
                </label>
                {isModified('emplacementFormate') && (
                  <button onClick={() => handleReset('emplacementFormate')} className="text-xs text-pg-dark underline">
                    Réinitialiser
                  </button>
                )}
              </div>
              <div className="relative">
                <input
                  type="text"
                  value={local.emplacementFormate}
                  readOnly
                  className={`w-full px-3 py-2.5 rounded-xl2 border text-sm outline-none transition-all bg-gray-50 dark:bg-gray-900 cursor-not-allowed opacity-75
                    ${isModified('emplacementFormate')
                      ? 'bg-yellow-50 border-yellow-400 dark:bg-yellow-900/20 dark:border-yellow-600 font-medium'
                      : 'bg-gray-50 dark:bg-gray-900 border-gray-300 dark:border-gray-700 text-gray-600 dark:text-gray-400'}`}
                  placeholder="Z##-A#-C###-N#-E#####"
                />
                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs">auto</span>
              </div>
              <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">Format: Z##-A#-C###-N#-E##### (ex: Z30-A1-C021-N1-E20000)</p>
            </div>

            {/* EAN */}
            <div>
              <div className="flex items-center justify-between mb-1">
                <label className="text-xs font-medium text-gray-600 dark:text-gray-400">
                  Code EAN
                  {isModified('ean') && <span className="ml-2 text-yellow-600 dark:text-yellow-400">●</span>}
                </label>
                {isModified('ean') && (
                  <button onClick={() => handleReset('ean')} className="text-xs text-pg-dark underline">
                    Réinitialiser
                  </button>
                )}
              </div>
              <div className="flex gap-2">
                <input
                  type="text"
                  value={local.ean}
                  onChange={e => handleChange('ean', e.target.value)}
                  className={fieldClass('ean') + ' flex-1'}
                  placeholder="Code EAN..."
                />
                <button
                  onClick={() => setScanningEan(v => !v)}
                  className="px-3 py-2.5 rounded-xl2 bg-pg-mid dark:bg-pg-dark text-pg-dark dark:text-white border border-pg-mid flex-shrink-0"
                  title="Scanner EAN"
                >
                  <Icon name="camera" size={18} />
                </button>
              </div>

              {scanningEan && (
                <div className="mt-3">
                  <Scanner
                    onScan={val => {
                      handleChange('ean', val);
                      setScanningEan(false);
                      showToast('EAN scanné : ' + val, 'success');
                    }}
                    onClose={() => setScanningEan(false)}
                  />
                </div>
              )}
            </div>
          </div>

          {/* Save button */}
          <button
            onClick={handleSave}
            className="w-full py-3.5 rounded-xl2 font-semibold text-white text-sm flex items-center justify-center gap-2 shadow-float transition-all active:scale-98"
            style={{ background: 'linear-gradient(135deg, #3D8F7A, #2a6457)' }}
          >
            <Icon name="check" size={18} />
            Enregistrer les modifications
          </button>
        </div>
      );
    }

    /* ─────────────────────────────── Import Tab ─── */
    function ImportTab({ products, onImport, onReset, showToast, darkMode }) {
      const [loading, setLoading] = useState(false);
      const [dragOver, setDragOver] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);
      const fileRef = useRef(null);

      const handleFile = async file => {
        if (!file) return;
        if (!file.name.match(/\.(xlsx|xls)$/i)) {
          showToast('Format non supporté. Utilisez .xlsx ou .xls', 'error');
          return;
        }
        setLoading(true);
        try {
          const parsed = await parseExcel(file);
          if (parsed.length === 0) {
            showToast('Aucun produit trouvé dans le fichier', 'warning');
          } else {
            await dbSave(parsed);
            onImport(parsed);
            showToast(`${parsed.length} produit(s) importé(s) avec succès`, 'success');
          }
        } catch (e) {
          console.error(e);
          showToast('Erreur lors de la lecture du fichier', 'error');
        } finally {
          setLoading(false);
        }
      };

      const handleDrop = e => {
        e.preventDefault();
        setDragOver(false);
        const file = e.dataTransfer.files[0];
        if (file) handleFile(file);
      };

      const handleReset = async () => {
        try {
          await dbReset();
          onReset();
          setConfirmReset(false);
          showToast('Base de données réinitialisée', 'success');
        } catch (e) {
          console.error(e);
          showToast('Erreur lors de la réinitialisation', 'error');
        }
      };

      const modifiedCount = products.filter(p => p.modified).length;

      return (
        <div className="space-y-5">
          {/* Drop zone */}
          <div
            onClick={() => fileRef.current?.click()}
            onDrop={handleDrop}
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            className={`rounded-xl3 border-2 border-dashed transition-all cursor-pointer flex flex-col items-center justify-center py-12 px-6 text-center
              ${dragOver ? 'border-pg-dark bg-pg-soft scale-[1.02]' : 'border-pg-mid bg-pg-soft/50 dark:bg-gray-800 dark:border-gray-600'}`}
          >
            {loading ? (
              <>
                <div className="w-14 h-14 rounded-full border-4 border-pg-mid border-t-pg-dark animate-spin mb-4" />
                <p className="text-pg-dark font-semibold">Lecture en cours...</p>
              </>
            ) : (
              <>
                <div className="w-16 h-16 rounded-xl3 bg-pg-mid flex items-center justify-center mb-4 shadow-card">
                  <Icon name="import" size={28} className="text-pg-dark" />
                </div>
                <p className="font-bold text-gray-700 dark:text-white text-lg mb-1">Importer fichier Excel</p>
                <p className="text-sm text-gray-500 dark:text-gray-400">Glissez-déposez ou cliquez pour sélectionner</p>
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">Formats : .xlsx, .xls</p>
              </>
            )}
            <input
              ref={fileRef}
              type="file"
              accept=".xlsx,.xls"
              className="hidden"
              onChange={e => handleFile(e.target.files[0])}
            />
          </div>

          {/* Stats */}
          {products.length > 0 && (
            <div className="grid grid-cols-2 gap-3 slide-up">
              <div className="bg-white dark:bg-gray-800 rounded-xl2 p-4 shadow-card border border-pg-soft dark:border-gray-700">
                <p className="text-2xl font-bold text-pg-dark">{products.length}</p>
                <p className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Produits chargés</p>
              </div>
              <div className="bg-white dark:bg-gray-800 rounded-xl2 p-4 shadow-card border border-pg-soft dark:border-gray-700">
                <p className="text-2xl font-bold text-amber-500">{modifiedCount}</p>
                <p className="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Produits modifiés</p>
              </div>
            </div>
          )}

          {/* Reset DB */}
          {products.length > 0 && (
            <div className="slide-up">
              {!confirmReset ? (
                <button
                  onClick={() => setConfirmReset(true)}
                  className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl2 border border-red-200 dark:border-red-900 bg-red-50 dark:bg-red-950/30 text-red-600 dark:text-red-400 text-sm font-medium hover:bg-red-100 dark:hover:bg-red-900/40 transition-all"
                >
                  <Icon name="trash" size={16} />
                  Réinitialiser la base de données
                </button>
              ) : (
                <div className="rounded-xl2 border border-red-300 dark:border-red-800 bg-red-50 dark:bg-red-950/30 p-4">
                  <p className="text-sm font-semibold text-red-700 dark:text-red-300 mb-1">Confirmer la réinitialisation ?</p>
                  <p className="text-xs text-red-500 dark:text-red-400 mb-3">Tous les produits et modifications seront supprimés.</p>
                  <div className="flex gap-2">
                    <button
                      onClick={handleReset}
                      className="flex-1 py-2 rounded-xl2 bg-red-600 hover:bg-red-700 text-white text-sm font-semibold transition-all"
                    >
                      Confirmer
                    </button>
                    <button
                      onClick={() => setConfirmReset(false)}
                      className="flex-1 py-2 rounded-xl2 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm font-semibold transition-all hover:bg-gray-200 dark:hover:bg-gray-600"
                    >
                      Annuler
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Info */}
          <div className="bg-pg-soft/60 dark:bg-gray-800 rounded-xl2 p-4 border border-pg-soft dark:border-gray-700">
            <div className="flex gap-3">
              <Icon name="info" size={18} className="text-pg-dark flex-shrink-0 mt-0.5" />
              <div>
                <p className="text-sm font-semibold text-gray-700 dark:text-gray-200 mb-1">Structure attendue (export Divalto)</p>
                <div className="space-y-0.5">
                  {[
                    ['A', 'Référence produit'],
                    ['B', 'Désignation'],
                    ['C', 'Stock'],
                    ['D', 'Emplacement formaté'],
                    ['E', 'Emplacement de stockage'],
                    ['F', 'Code EAN'],
                    ['G', 'Fournisseur'],
                    ['H', 'Unité de vente'],
                    ['I', 'Référence fournisseur'],
                  ].map(([col, desc]) => (
                    <div key={col} className="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
                      <span className="w-5 h-5 rounded bg-pg-mid text-pg-dark font-bold flex items-center justify-center text-xs">{col}</span>
                      <span>{desc}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─────────────────────────────── Search Tab ─── */
    function SearchTab({ products, onUpdate, showToast, darkMode, filters, applyFilters }) {
      const [query, setQuery] = useState('');
      const [mode, setMode] = useState('text');
      const [scanning, setScanning] = useState(false);
      const [selected, setSelected] = useState(null);
      const inputRef = useRef(null);

      const hasActiveFilter = filters.noEmplacement || filters.stockZero || filters.cdeFournisseur;

      // Start from filtered list (if filters active) or all products
      const baseList = hasActiveFilter ? applyFilters(products) : products;

      const filtered = query.trim().length < 1
        ? (hasActiveFilter ? baseList : [])
        : baseList.filter(p => {
            const q = query.toLowerCase();
            return (
              p.ref.toLowerCase().includes(q) ||
              p.designation.toLowerCase().includes(q) ||
              p.ean.toLowerCase().includes(q) ||
              p.refFournisseur.toLowerCase().includes(q)
            );
          }).slice(0, 50);

      const handleScan = val => {
        setMode('text');
        setScanning(false);
        setQuery(val);
        showToast('Code scanné', 'success');
      };

      const handleModeToggle = () => {
        if (mode === 'text') {
          setMode('scan');
          setScanning(true);
        } else {
          setMode('text');
          setScanning(false);
          setTimeout(() => inputRef.current?.focus(), 100);
        }
      };

      if (selected) {
        return (
          <ProductCard
            product={selected}
            onUpdate={p => {
              onUpdate(p);
              setSelected(p);
            }}
            onClose={() => setSelected(null)}
            showToast={showToast}
            darkMode={darkMode}
          />
        );
      }

      return (
        <div className="space-y-4">
          {/* Search bar */}
          <div className="flex gap-2">
            <div className="flex-1 relative">
              <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                <Icon name="search" size={18} />
              </div>
              <input
                ref={inputRef}
                type="text"
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder="Réf, désignation, EAN, fournisseur..."
                className="w-full pl-9 pr-3 py-3 rounded-xl2 border border-pg-mid bg-white dark:bg-gray-800 dark:border-gray-700 dark:text-white text-sm outline-none focus:border-pg-dark focus:shadow-card transition-all"
                autoComplete="off"
              />
            </div>
            <button
              onClick={handleModeToggle}
              className={`px-3 py-3 rounded-xl2 border font-medium text-sm flex items-center gap-1.5 transition-all flex-shrink-0
                ${mode === 'scan'
                  ? 'bg-pg-dark border-pg-dark text-white'
                  : 'bg-white dark:bg-gray-800 border-pg-mid dark:border-gray-700 text-pg-dark dark:text-pg-mid'}`}
            >
              <Icon name={mode === 'scan' ? 'keyboard' : 'camera'} size={18} />
              <span className="hidden sm:inline">{mode === 'scan' ? 'Saisie' : 'Scan'}</span>
            </button>
          </div>

          {/* Scanner */}
          {scanning && (
            <div className="bg-white dark:bg-gray-800 rounded-xl2 p-3 shadow-card border border-pg-soft dark:border-gray-700">
              <p className="text-xs text-center text-gray-500 dark:text-gray-400 mb-3 pulse">
                Pointez la caméra vers un code-barres
              </p>
              <Scanner
                onScan={handleScan}
                onClose={() => { setScanning(false); setMode('text'); }}
              />
            </div>
          )}

          {/* No products loaded */}
          {products.length === 0 && (
            <div className="text-center py-16">
              <div className="w-16 h-16 rounded-xl3 bg-pg-soft mx-auto flex items-center justify-center mb-3">
                <Icon name="warehouse" size={28} className="text-pg-dark" />
              </div>
              <p className="font-semibold text-gray-600 dark:text-gray-400">Aucun produit chargé</p>
              <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">Importez d'abord votre fichier Excel</p>
            </div>
          )}

          {/* Empty query hint */}
          {products.length > 0 && query.trim().length === 0 && !scanning && !hasActiveFilter && (
            <div className="text-center py-10">
              <Icon name="search" size={32} className="text-pg-mid mx-auto mb-3" />
              <p className="text-gray-500 dark:text-gray-400 text-sm">{products.length} produit(s) disponibles</p>
              <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">Saisissez votre recherche ou scannez un code-barres</p>
            </div>
          )}

          {/* Active filter, no query — show filtered list */}
          {products.length > 0 && query.trim().length === 0 && !scanning && hasActiveFilter && baseList.length > 0 && (
            <div className="space-y-2 slide-up">
              <p className="text-xs text-gray-400 dark:text-gray-500 font-medium">{baseList.length} produit(s) filtré(s)</p>
              {baseList.slice(0, 50).map(p => (
                <div
                  key={p.id}
                  onClick={() => setSelected(p)}
                  className={`bg-white dark:bg-gray-800 rounded-xl2 px-4 py-3.5 shadow-card border cursor-pointer active:scale-[0.99] transition-all
                    ${p.modified
                      ? 'border-green-200 dark:border-green-800 bg-green-50/50 dark:bg-green-900/10'
                      : 'border-pg-soft dark:border-gray-700'}`}
                >
                  <div className="flex items-start gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-gray-800 dark:text-white text-sm">{p.ref}</span>
                        {p.modified && (
                          <span className="px-1.5 py-0.5 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 text-xs rounded font-semibold">
                            modifié
                          </span>
                        )}
                      </div>
                      <p className="text-xs text-gray-500 dark:text-gray-400 truncate mt-0.5">{p.designation}</p>
                      <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                        {p.emplacement && p.emplacement.trim() ? (
                          <span className="text-xs bg-pg-soft dark:bg-gray-700 text-pg-dark dark:text-pg-mid px-2 py-0.5 rounded-lg font-medium">
                            {p.emplacement}
                          </span>
                        ) : (
                          <span className="text-xs bg-red-50 dark:bg-red-950/30 text-red-500 dark:text-red-400 px-2 py-0.5 rounded-lg font-medium">Sans empl.</span>
                        )}
                        {(!p.stock || p.stock.trim() === '' || p.stock.trim() === '0') && (
                          <span className="text-xs bg-amber-50 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400 px-2 py-0.5 rounded-lg font-medium">Stock 0</span>
                        )}
                        {p.ean && (
                          <span className="text-xs text-gray-400 dark:text-gray-500 font-mono">EAN: {p.ean}</span>
                        )}
                      </div>
                    </div>
                    <Icon name="edit" size={16} className="text-pg-dark dark:text-pg-mid flex-shrink-0 mt-1" />
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Active filter, no results */}
          {products.length > 0 && query.trim().length === 0 && !scanning && hasActiveFilter && baseList.length === 0 && (
            <div className="text-center py-10">
              <Icon name="search" size={32} className="text-gray-300 dark:text-gray-600 mx-auto mb-3" />
              <p className="text-gray-500 dark:text-gray-400 text-sm">Aucun produit ne correspond aux filtres</p>
            </div>
          )}

          {/* Results */}
          {filtered.length > 0 && (
            <div className="space-y-2 slide-up">
              <p className="text-xs text-gray-400 dark:text-gray-500 font-medium">{filtered.length} résultat(s)</p>
              {filtered.map(p => (
                <div
                  key={p.id}
                  onClick={() => setSelected(p)}
                  className={`bg-white dark:bg-gray-800 rounded-xl2 px-4 py-3.5 shadow-card border cursor-pointer active:scale-[0.99] transition-all
                    ${p.modified
                      ? 'border-green-200 dark:border-green-800 bg-green-50/50 dark:bg-green-900/10'
                      : 'border-pg-soft dark:border-gray-700'}`}
                >
                  <div className="flex items-start gap-3">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="font-bold text-gray-800 dark:text-white text-sm">{p.ref}</span>
                        {p.modified && (
                          <span className="px-1.5 py-0.5 bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 text-xs rounded font-semibold">
                            modifié
                          </span>
                        )}
                      </div>
                      <p className="text-xs text-gray-500 dark:text-gray-400 truncate mt-0.5">{p.designation}</p>
                      <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                        {p.emplacement && (
                          <span className="text-xs bg-pg-soft dark:bg-gray-700 text-pg-dark dark:text-pg-mid px-2 py-0.5 rounded-lg font-medium">
                            {p.emplacement}
                          </span>
                        )}
                        {p.ean && (
                          <span className="text-xs text-gray-400 dark:text-gray-500 font-mono">EAN: {p.ean}</span>
                        )}
                        {p.stock && (
                          <span className="text-xs text-gray-400 dark:text-gray-500">Stock: {p.stock}</span>
                        )}
                      </div>
                    </div>
                    <Icon name="edit" size={16} className="text-pg-dark dark:text-pg-mid flex-shrink-0 mt-1" />
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* No results */}
          {query.trim().length > 0 && filtered.length === 0 && (
            <div className="text-center py-10">
              <Icon name="search" size={32} className="text-gray-300 dark:text-gray-600 mx-auto mb-3" />
              <p className="text-gray-500 dark:text-gray-400 text-sm">Aucun produit trouvé</p>
              <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">pour « {query} »</p>
            </div>
          )}
        </div>
      );
    }

    /* ─────────────────────────────── Modifications Tab ─── */
    function ModificationsTab({ products, onUpdate, showToast, darkMode }) {
      const [selected, setSelected] = useState(null);
      const modified = products.filter(p => p.modified);

      if (selected) {
        return (
          <ProductCard
            product={selected}
            onUpdate={p => { onUpdate(p); setSelected(p); }}
            onClose={() => setSelected(null)}
            showToast={showToast}
            darkMode={darkMode}
          />
        );
      }

      if (modified.length === 0) {
        return (
          <div className="text-center py-20">
            <div className="w-16 h-16 rounded-xl3 bg-pg-soft dark:bg-gray-800 mx-auto flex items-center justify-center mb-3">
              <Icon name="check" size={28} className="text-pg-dark" />
            </div>
            <p className="font-semibold text-gray-600 dark:text-gray-300">Aucune modification</p>
            <p className="text-xs text-gray-400 dark:text-gray-500 mt-1">
              {products.length === 0 ? 'Importez d\'abord votre fichier Excel' : 'Toutes les données sont à jour'}
            </p>
          </div>
        );
      }

      return (
        <div className="space-y-3 slide-up">
          <div className="flex items-center justify-between">
            <p className="text-sm font-semibold text-gray-700 dark:text-gray-200">
              {modified.length} produit(s) modifié(s)
            </p>
            <span className="text-xs text-gray-400 dark:text-gray-500">Appuyez pour éditer</span>
          </div>
          {modified.map(p => (
            <div
              key={p.id}
              onClick={() => setSelected(p)}
              className="bg-white dark:bg-gray-800 rounded-xl2 px-4 py-3.5 shadow-card border border-amber-200 dark:border-amber-800 bg-amber-50/30 dark:bg-amber-900/10 cursor-pointer active:scale-[0.99] transition-all"
            >
              <div className="flex items-start gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="font-bold text-gray-800 dark:text-white text-sm">{p.ref}</span>
                    <span className="text-xs text-amber-600 dark:text-amber-400">●</span>
                  </div>
                  <p className="text-xs text-gray-500 dark:text-gray-400 truncate mt-0.5">{p.designation}</p>
                  <div className="mt-2 space-y-1">
                    {p.modifiedFields.emplacement && (
                      <div className="flex items-center gap-2 text-xs">
                        <span className="w-1.5 h-1.5 rounded-full bg-yellow-400 flex-shrink-0" />
                        <span className="text-gray-400 dark:text-gray-500">Emplacement :</span>
                        <span className="font-mono bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 px-1.5 rounded truncate">
                          {p.emplacement}
                        </span>
                      </div>
                    )}
                    {p.modifiedFields.emplacementFormate && (
                      <div className="flex items-center gap-2 text-xs">
                        <span className="w-1.5 h-1.5 rounded-full bg-yellow-400 flex-shrink-0" />
                        <span className="text-gray-400 dark:text-gray-500">Empl. formaté :</span>
                        <span className="font-mono bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 px-1.5 rounded truncate">
                          {p.emplacementFormate}
                        </span>
                      </div>
                    )}
                    {p.modifiedFields.ean && (
                      <div className="flex items-center gap-2 text-xs">
                        <span className="w-1.5 h-1.5 rounded-full bg-yellow-400 flex-shrink-0" />
                        <span className="text-gray-400 dark:text-gray-500">EAN :</span>
                        <span className="font-mono bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-400 px-1.5 rounded truncate">
                          {p.ean}
                        </span>
                      </div>
                    )}
                  </div>
                </div>
                <Icon name="edit" size={16} className="text-amber-500 flex-shrink-0 mt-1" />
              </div>
            </div>
          ))}
        </div>
      );
    }

    /* ─────────────────────────────── Export Tab ─── */
    function ExportTab({ products, showToast, darkMode }) {
      const [exporting, setExporting] = useState(false);
      const [done, setDone] = useState(false);
      const modified = products.filter(p => p.modified);

      const handleExport = async () => {
        if (modified.length === 0) {
          showToast('Aucune modification à exporter', 'info');
          return;
        }
        setExporting(true);
        setDone(false);
        try {
          const ok = await exportModified(products);
          if (ok) {
            setDone(true);
            showToast(`${modified.length} produit(s) exporté(s)`, 'success');
          }
        } catch (e) {
          console.error(e);
          showToast('Erreur lors de la génération du fichier', 'error');
        } finally {
          setExporting(false);
        }
      };

      const fieldLabels = { emplacement: 'Emplacement', emplacementFormate: 'Empl. formaté', ean: 'Code EAN' };

      return (
        <div className="space-y-5">
          {/* Summary */}
          <div className="bg-white dark:bg-gray-800 rounded-xl3 p-5 shadow-card border border-pg-soft dark:border-gray-700">
            <p className="text-sm font-semibold text-gray-600 dark:text-gray-400 mb-3">Résumé des modifications</p>
            <div className="grid grid-cols-3 gap-3">
              <div className="text-center">
                <p className="text-2xl font-bold text-gray-700 dark:text-white">{products.length}</p>
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">Total</p>
              </div>
              <div className="text-center">
                <p className="text-2xl font-bold text-amber-500">{modified.length}</p>
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">Modifiés</p>
              </div>
              <div className="text-center">
                <p className="text-2xl font-bold text-gray-400 dark:text-gray-500">{products.length - modified.length}</p>
                <p className="text-xs text-gray-400 dark:text-gray-500 mt-0.5">Inchangés</p>
              </div>
            </div>
          </div>

          {/* Modified breakdown */}
          {modified.length > 0 && (
            <div className="bg-white dark:bg-gray-800 rounded-xl3 p-4 shadow-card border border-pg-soft dark:border-gray-700">
              <p className="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide mb-2">
                Détail par champ modifié
              </p>
              {Object.entries(fieldLabels).map(([field, label]) => {
                const count = modified.filter(p => p.modifiedFields[field]).length;
                return count > 0 ? (
                  <div key={field} className="flex items-center justify-between py-1.5 border-b border-pg-soft/50 dark:border-gray-700 last:border-0">
                    <div className="flex items-center gap-2">
                      <span className="w-2.5 h-2.5 rounded-sm bg-yellow-400" />
                      <span className="text-sm text-gray-600 dark:text-gray-300">{label}</span>
                    </div>
                    <span className="font-bold text-sm text-amber-600 dark:text-amber-400">{count}</span>
                  </div>
                ) : null;
              })}
            </div>
          )}

          {/* Export button */}
          <button
            onClick={handleExport}
            disabled={exporting || modified.length === 0}
            className={`w-full py-4 rounded-xl3 font-bold text-white text-base flex items-center justify-center gap-3 shadow-float transition-all
              ${modified.length === 0 ? 'opacity-50 cursor-not-allowed bg-gray-400' : 'active:scale-[0.99]'}`}
            style={modified.length > 0 ? { background: 'linear-gradient(135deg, #3D8F7A, #2a6457)' } : {}}
          >
            {exporting ? (
              <>
                <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin" />
                Génération en cours...
              </>
            ) : done ? (
              <>
                <Icon name="check" size={20} />
                Fichier généré !
              </>
            ) : (
              <>
                <Icon name="export" size={20} />
                Exporter les produits modifiés
              </>
            )}
          </button>

          {modified.length === 0 && products.length === 0 && (
            <p className="text-center text-xs text-gray-400 dark:text-gray-500">
              Importez d'abord un fichier Excel et modifiez des produits
            </p>
          )}
          {modified.length === 0 && products.length > 0 && (
            <p className="text-center text-xs text-gray-400 dark:text-gray-500">
              Aucun produit modifié — recherchez et modifiez des produits d'abord
            </p>
          )}

          {/* Legend */}
          <div className="bg-pg-soft/60 dark:bg-gray-800 rounded-xl2 p-4 border border-pg-soft dark:border-gray-700">
            <p className="text-xs font-semibold text-gray-600 dark:text-gray-400 mb-2">Format du fichier exporté</p>
            <div className="space-y-1.5 text-xs text-gray-500 dark:text-gray-400">
              <div className="flex items-center gap-2">
                <span className="w-4 h-4 rounded-sm bg-yellow-200 border border-yellow-400 flex-shrink-0" />
                <span>Cellule modifiée — surlignée en jaune</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="w-4 h-4 rounded-sm bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 flex-shrink-0" />
                <span>Cellule non modifiée — sans couleur</span>
              </div>
              <div className="flex items-center gap-2">
                <span className="w-4 h-4 rounded-sm flex-shrink-0" style={{ background: '#3D8F7A' }} />
                <span>En-tête — vert foncé</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ─────────────────────────────── Main App ─── */
    function App() {
      const [products, setProducts] = useState([]);
      const [activeTab, setActiveTab] = useState('import');
      const [toast, setToast] = useState(null);
      const [darkMode, setDarkMode] = useState(false);
      const [ready, setReady] = useState(false);
      const [filters, setFilters] = useState({ noEmplacement: false, stockZero: false, cdeFournisseur: false });
      const toastTimer = useRef(null);

      // Load from IndexedDB on init
      useEffect(() => {
        dbLoad().then(data => {
          if (data.length > 0) setProducts(data);
          setReady(true);
        }).catch(() => setReady(true));
      }, []);

      // Dark mode
      useEffect(() => {
        document.documentElement.classList.toggle('dark', darkMode);
      }, [darkMode]);

      const showToast = (message, type = 'info') => {
        clearTimeout(toastTimer.current);
        setToast({ message, type });
        toastTimer.current = setTimeout(() => setToast(null), 3000);
      };

      const handleImport = (data) => {
        setProducts(data);
        setActiveTab('search');
      };

      const handleResetDB = () => {
        setProducts([]);
      };

      const handleUpdate = (updated) => {
        setProducts(prev => {
          const next = prev.map(p => p.id === updated.id ? updated : p);
          dbSave(next).catch(() => {});
          return next;
        });
      };

      const modifiedCount = products.filter(p => p.modified).length;

      const toggleFilter = (key) => {
        setFilters(prev => {
          const next = { ...prev, [key]: !prev[key] };
          if (!prev[key]) setActiveTab('search');
          return next;
        });
      };

      const hasActiveFilter = filters.noEmplacement || filters.stockZero || filters.cdeFournisseur;

      const clearFilters = () => setFilters({ noEmplacement: false, stockZero: false, cdeFournisseur: false });

      const applyFilters = (list) => {
        let result = list;
        if (filters.noEmplacement) result = result.filter(p => !p.emplacement || p.emplacement.trim() === '');
        if (filters.stockZero) result = result.filter(p => !p.stock || p.stock.trim() === '' || p.stock.trim() === '0');
        if (filters.cdeFournisseur) result = result.filter(p => p.cdeFournisseur && parseFloat(p.cdeFournisseur) > 0);
        return result;
      };

      const filteredProducts = hasActiveFilter ? applyFilters(products) : null;

      const filterButtons = [
        { key: 'noEmplacement', label: 'Sans empl.', icon: 'warehouse', count: products.filter(p => !p.emplacement || p.emplacement.trim() === '').length },
        { key: 'stockZero', label: 'Stock 0', icon: 'x', count: products.filter(p => !p.stock || p.stock.trim() === '' || p.stock.trim() === '0').length },
        { key: 'cdeFournisseur', label: 'Cmd four.', icon: 'import', count: products.filter(p => p.cdeFournisseur && parseFloat(p.cdeFournisseur) > 0).length },
      ];

      const tabs = [
        { id: 'import', label: 'Importer', icon: 'import' },
        { id: 'search', label: 'Rechercher', icon: 'search' },
        { id: 'modifications', label: 'Modifiés', icon: 'list', badge: modifiedCount },
        { id: 'export', label: 'Exporter', icon: 'export' },
      ];

      if (!ready) {
        return (
          <div className="min-h-screen bg-pg-light flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 rounded-xl3 bg-pg-mid flex items-center justify-center mx-auto mb-4 shadow-float">
                <Icon name="warehouse" size={30} className="text-pg-dark" />
              </div>
              <div className="w-8 h-8 border-3 border-pg-mid border-t-pg-dark rounded-full animate-spin mx-auto" style={{ borderWidth: 3 }} />
            </div>
          </div>
        );
      }

      return (
        <div className={`min-h-screen flex flex-col ${darkMode ? 'dark' : ''}`}
          style={{ background: darkMode ? '#111b16' : '#F5FDF8' }}>
          <Toast toast={toast} />

          {/* Header */}
          <header className="sticky top-0 z-30 px-4 pt-4 pb-3"
            style={{ background: darkMode ? 'rgba(17,27,22,0.95)' : 'rgba(245,253,248,0.95)', backdropFilter: 'blur(12px)' }}>
            <div className="flex items-center justify-between max-w-lg mx-auto">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl2 bg-pg-dark flex items-center justify-center shadow-card">
                  <Icon name="warehouse" size={18} className="text-white" />
                </div>
                <div>
                  <h1 className="font-bold text-gray-800 dark:text-white text-base leading-tight">Vérif Emplacements</h1>
                  {products.length > 0 && (
                    <p className="text-xs text-gray-400 dark:text-gray-500">
                      {filteredProducts !== null ? `${filteredProducts.length} / ${products.length}` : products.length} produits
                    </p>
                  )}
                </div>
              </div>
              <button
                onClick={() => setDarkMode(v => !v)}
                className="w-9 h-9 rounded-xl2 flex items-center justify-center bg-pg-soft dark:bg-gray-800 text-pg-dark dark:text-pg-mid border border-pg-mid/30 dark:border-gray-700"
              >
                <Icon name={darkMode ? 'sun' : 'moon'} size={16} />
              </button>
            </div>

            {/* Quick filter buttons */}
            {products.length > 0 && (
              <div className="flex items-center gap-1.5 mt-2.5 max-w-lg mx-auto overflow-x-auto">
                {filterButtons.map(f => (
                  <button
                    key={f.key}
                    onClick={() => toggleFilter(f.key)}
                    className={`flex items-center gap-1 px-2.5 py-1.5 rounded-xl2 text-xs font-medium border transition-all whitespace-nowrap flex-shrink-0
                      ${filters[f.key]
                        ? 'bg-pg-dark text-white border-pg-dark shadow-card'
                        : 'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border-pg-mid dark:border-gray-600'}`}
                  >
                    <Icon name={f.icon} size={12} />
                    <span>{f.label}</span>
                    <span className={`ml-0.5 px-1 rounded-full text-[10px] font-bold
                      ${filters[f.key] ? 'bg-white/20 text-white' : 'bg-pg-soft dark:bg-gray-700 text-pg-dark dark:text-pg-mid'}`}>
                      {f.count}
                    </span>
                  </button>
                ))}
                {hasActiveFilter && (
                  <button
                    onClick={clearFilters}
                    className="flex items-center gap-1 px-2.5 py-1.5 rounded-xl2 text-xs font-medium text-red-500 dark:text-red-400 border border-red-200 dark:border-red-800 bg-red-50 dark:bg-red-950/30 whitespace-nowrap flex-shrink-0"
                  >
                    Tout afficher
                  </button>
                )}
              </div>
            )}
          </header>

          {/* Content */}
          <main className="flex-1 overflow-y-auto px-4 py-4 pb-24 max-w-lg mx-auto w-full">
            {activeTab === 'import' && (
              <ImportTab products={products} onImport={handleImport} onReset={handleResetDB} showToast={showToast} darkMode={darkMode} />
            )}
            {activeTab === 'search' && (
              <SearchTab products={products} onUpdate={handleUpdate} showToast={showToast} darkMode={darkMode} filters={filters} applyFilters={applyFilters} />
            )}
            {activeTab === 'modifications' && (
              <ModificationsTab products={products} onUpdate={handleUpdate} showToast={showToast} darkMode={darkMode} />
            )}
            {activeTab === 'export' && (
              <ExportTab products={products} showToast={showToast} darkMode={darkMode} />
            )}
          </main>

          {/* Bottom Nav */}
          <nav className="fixed bottom-0 left-0 right-0 z-30 px-2 pb-safe"
            style={{
              background: darkMode ? 'rgba(17,27,22,0.97)' : 'rgba(245,253,248,0.97)',
              backdropFilter: 'blur(16px)',
              borderTop: darkMode ? '1px solid rgba(255,255,255,0.05)' : '1px solid rgba(168,230,207,0.4)',
              paddingBottom: 'max(8px, env(safe-area-inset-bottom))',
            }}>
            <div className="flex items-center max-w-lg mx-auto">
              {tabs.map(tab => (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  className={`flex-1 flex flex-col items-center gap-0.5 py-2 px-1 rounded-xl2 transition-all relative
                    ${activeTab === tab.id
                      ? 'text-pg-dark dark:text-pg-mid'
                      : 'text-gray-400 dark:text-gray-600'}`}
                >
                  <div className="relative">
                    <Icon name={tab.icon} size={22} />
                    {tab.badge > 0 && (
                      <span className="absolute -top-1.5 -right-2 min-w-[16px] h-4 bg-amber-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center px-0.5">
                        {tab.badge > 99 ? '99+' : tab.badge}
                      </span>
                    )}
                  </div>
                  <span className={`text-[10px] font-medium ${activeTab === tab.id ? 'font-semibold' : ''}`}>
                    {tab.label}
                  </span>
                  {activeTab === tab.id && (
                    <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-6 h-0.5 rounded-full bg-pg-dark dark:bg-pg-mid" />
                  )}
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
